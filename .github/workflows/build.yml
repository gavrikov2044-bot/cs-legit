name: 🔓 Build External

on:
  push:
    branches: [main]
    paths:
      - 'externa/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  VERSION: "1.0.${{ github.run_number }}"

jobs:
  build-external:
    name: 🔓 EXTERNAL (Overlay ESP)
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: 🔧 Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      
      - name: ⚡ Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      
      - name: 💾 Cache Dependencies
        uses: actions/cache@v4
        with:
          path: externa/build/_deps
          key: ${{ runner.os }}-external-${{ hashFiles('externa/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-external-
      
      - name: ⚙️ Configure
        working-directory: externa
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "   EXTERNAL ESP v${{ env.VERSION }}"
          Write-Host "=========================================="
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      
      - name: 🔨 Build
        working-directory: externa
        run: cmake --build build --config Release --parallel
      
      - name: ✅ Verify
        working-directory: externa
        run: |
          $exe = Get-ChildItem -Path build -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            $size = [math]::Round($exe.Length / 1KB, 2)
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "   BUILD SUCCESS"
            Write-Host "   File: $($exe.Name)"
            Write-Host "   Size: $size KB"
            Write-Host "=========================================="
          } else {
            Write-Error "Build failed!"
            exit 1
          }

      - name: 📤 Upload to Server
        if: success() && github.ref == 'refs/heads/main'
        working-directory: externa
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          CI_API_KEY: ${{ secrets.CI_API_KEY }}
        run: |
          Write-Host "Uploading to server..."
          
          $exe = Get-ChildItem -Path build -Filter "*.exe" | Select-Object -First 1
          
          if ($exe) {
            # Create version info
            $versionJson = @{
              version = "${{ env.VERSION }}"
              build = ${{ github.run_number }}
              commit = "${{ github.sha }}"
              date = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
            } | ConvertTo-Json
            
            $versionJson | Out-File -FilePath "build/version.json" -Encoding UTF8
            
            # Use direct IP for reliability (avoid DNS issues)
            $uploadUrl = $env:SERVER_URL -replace 'single-project\.duckdns\.org', '138.124.0.8'
            $uploadUrl = $uploadUrl -replace 'single-project\.ddns\.net', '138.124.0.8'
            Write-Host "Upload URL: $uploadUrl"
            
            curl.exe -X POST "$uploadUrl/api/admin/ci/upload" `
              -H "X-CI-API-Key: $env:CI_API_KEY" `
              -H "Host: single-project.ddns.net" `
              -F "game_id=cs2" `
              -F "file_type=externa" `
              -F "version=${{ env.VERSION }}" `
              -F "file=@$($exe.FullName)"
              
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Uploaded to server!"
            } else {
              Write-Host "❌ Upload failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "❌ No exe found"
            exit 1
          }
      
      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: External-v${{ env.VERSION }}
          path: |
            externa/build/*.exe
            externa/build/version.json
          retention-days: 30
